<header>

    <p>ゲームプログラマー | 2027年卒業予定</p>

<section id="works">

    <div class="project-item">
        <h3 class="project-title">作品名：[BlockBeeaker]</h3>
        
        <div class="project-meta">使用言語・ツール：C / C++</div>

        <h4 class="project-desc-h4">担当箇所</h4>
        <p>全プログラム、ゲームロジック実装</p>
        
        <h4 class="project-desc-h4">工夫した点</h4>
        <p>特に注力したのは、ボールの衝突計算とバウンド処理における物理的な挙動を、プログラムで正確に再現することです。</p>
